name: Richiesta funzionalità
description: Suggerisci una nuova funzionalità per Snode
title: "[Feature] "
labels:
  - enhancement

body:
  - type: markdown
    attributes:
      value: |
        Grazie per aver proposto una nuova funzionalità per Snode! 🚀

        Prima di continuare, controlla che la funzionalità non sia già stata richiesta.

  - type: textarea
    id: idea
    attributes:
      label: 💡 Che funzionalità vorresti?
      description: Descrivi in modo chiaro la funzionalità.
      placeholder: Vorrei che Snode permettesse di...
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: ❓ Perché è utile?
      description: Spiega quale problema risolve.
      placeholder: Sarebbe utile perché...
    validations:
      required: true

  - type: textarea
    id: behavior
    attributes:
      label: ⚙️ Come dovrebbe funzionare?
      description: Descrivi il comportamento ideale.
      placeholder: Quando l'utente fa X, Snode dovrebbe...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 🔄 Alternative
      description: Hai altre idee o soluzioni alternative?
      placeholder: Si potrebbe anche fare...

  - type: textarea
    id: extra
    attributes:
      label: 📎 Informazioni aggiuntive
      description: Screenshot, esempi o dettagli extra.

  - type: checkboxes
    id: checks
    attributes:
      label: ✔️ Controlli
      options:
        - label: Ho verificato che questa funzionalità non sia già stata proposta
          required: true
